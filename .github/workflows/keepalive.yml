name: Supabase Keepalive

on:
  schedule:
    # Run every 3 days at 06:00 UTC (well within the 7-day pause window)
    - cron: "0 6 */3 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Keepalive-Secret: ${{ secrets.KEEPALIVE_SECRET }}" \
            "https://app.verisum.org/api/keepalive")
          echo "Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Keepalive ping failed with status $RESPONSE"
            exit 1
          fi
